      DbName: "postgres"
      DbUser: "postgres"
      DbPassword: "Medico#123456$"
      DbSsl: "disable"
      BcryptCost: "12"
      JwtAccessSecret: "dev_only_change_me"
      AccessTokenTtlSeconds: "900"
      RefreshTokenTtlSeconds: "86400"
      RefreshTokenTtlRememberSeconds: "2592000"
      S3Bucket: "jedmee"
      S3Region: "eu-north-1"
      SmtpHost: "smtp.gmail.com"
      SmtpPort: "587"
      SmtpSecure: "0"
      SmtpUser: "supportjedmee@gmail.com"
      SmtpPass: "ktok ojzb wvmz pbnn"
      SmtpFrom: "JedMee <supportjedmee@gmail.com>"
