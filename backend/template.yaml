      BrandDisplayName: "JedMee"
      AppName: "medico-user-backend"
      ApiName: "medico-user-api"
      LightLayerName: "medico-user-lib-light"
      DbHost: "db.tcmjudishpkcyesabvqq.supabase.co"
      DbPort: "5432"
      DbName: "postgres"
      DbUser: "postgres"
      DbPassword: "Medico#123456$"
      DbSsl: "require"
      BcryptCost: "12"
      JwtAccessSecret: "change_me_in_prod"
      AccessTokenTtlSeconds: "900"
      RefreshTokenTtlSeconds: "86400"
      RefreshTokenTtlRememberSeconds: "2592000"
      S3Bucket: "jedmee"
