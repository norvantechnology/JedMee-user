AWSTemplateFormatVersion: 2010-09-09
Description: JedMee User Backend (StageConfig holds DB, JWT, Smtp*, OTP TTL — treat like secrets in prod)
Transform: AWS::Serverless-2016-10-31

Parameters:
  Stage:
    Type: String
    AllowedValues:
      - local
      - dev
      - prod
    Default: local
    Description: Deployment stage (local/dev/prod)

