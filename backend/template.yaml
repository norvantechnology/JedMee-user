            Path: /auth/refresh
            Method: POST
        AuthLogout:
          Type: Api
          Properties:
            RestApiId: !Ref Api
            Path: /auth/logout
            Method: POST
        AuthChangePassword:
          Type: Api
          Properties:
            RestApiId: !Ref Api
            Path: /auth/password/change
            Method: POST
        AuthRequestOtp:
          Type: Api
          Properties:
