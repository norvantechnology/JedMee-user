        BCRYPT_COST: !FindInMap [StageConfig, !Ref Stage, BcryptCost]
        JWT_ACCESS_SECRET: !FindInMap [StageConfig, !Ref Stage, JwtAccessSecret]
        ACCESS_TOKEN_TTL_SECONDS: !FindInMap [StageConfig, !Ref Stage, AccessTokenTtlSeconds]
