Globals:
  Function:
    Runtime: nodejs22.x
    MemorySize: !FindInMap [StageConfig, !Ref Stage, MemorySize]
    Timeout: 30
    Tracing: Active
    Environment:
      Variables:
        STAGE: !Ref Stage
        PANEL: "user"
        APP_NAME: !FindInMap [StageConfig, !Ref Stage, AppName]
        APP_BRAND_NAME: !FindInMap [StageConfig, !Ref Stage, BrandDisplayName]
        DB_HOST: !FindInMap [StageConfig, !Ref Stage, DbHost]
        DB_PORT: !FindInMap [StageConfig, !Ref Stage, DbPort]
        DB_NAME: !FindInMap [StageConfig, !Ref Stage, DbName]
        DB_USER: !FindInMap [StageConfig, !Ref Stage, DbUser]
        DB_PASSWORD: !FindInMap [StageConfig, !Ref Stage, DbPassword]
        DB_SSL: !FindInMap [StageConfig, !Ref Stage, DbSsl]
        BCRYPT_COST: !FindInMap [StageConfig, !Ref Stage, BcryptCost]
        JWT_ACCESS_SECRET: !FindInMap [StageConfig, !Ref Stage, JwtAccessSecret]
        ACCESS_TOKEN_TTL_SECONDS: !FindInMap [StageConfig, !Ref Stage, AccessTokenTtlSeconds]
        REFRESH_TOKEN_TTL_SECONDS: !FindInMap [StageConfig, !Ref Stage, RefreshTokenTtlSeconds]
        REFRESH_TOKEN_TTL_REMEMBER_SECONDS: !FindInMap [StageConfig, !Ref Stage, RefreshTokenTtlRememberSeconds]
        S3_BUCKET: !FindInMap [StageConfig, !Ref Stage, S3Bucket]
        S3_REGION: !FindInMap [StageConfig, !Ref Stage, S3Region]
        SMTP_HOST: !FindInMap [StageConfig, !Ref Stage, SmtpHost]
        SMTP_PORT: !FindInMap [StageConfig, !Ref Stage, SmtpPort]
        SMTP_SECURE: !FindInMap [StageConfig, !Ref Stage, SmtpSecure]
        SMTP_USER: !FindInMap [StageConfig, !Ref Stage, SmtpUser]
        SMTP_PASS: !FindInMap [StageConfig, !Ref Stage, SmtpPass]
        SMTP_FROM: !FindInMap [StageConfig, !Ref Stage, SmtpFrom]
        EMAIL_VERIFY_OTP_TTL_MINUTES: !FindInMap [StageConfig, !Ref Stage, EmailVerifyOtpTtlMinutes]
        PASSWORD_RESET_OTP_TTL_MINUTES: !FindInMap [StageConfig, !Ref Stage, PasswordResetOtpTtlMinutes]
        MEDICO_EMAIL_DRY_RUN: !FindInMap [StageConfig, !Ref Stage, MedicoEmailDryRun]
    Layers:
      - !Ref libsLight
    Tags:
      Application: "JedMee"
      Panel: "User"
      Environment: !FindInMap [StageConfig, !Ref Stage, EnvironmentTag]

Resources:
  # ── Shared IAM execution role ───────────────────────────────────────────────
  LambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub medico-user-lambda-role-${Stage}
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
        - arn:aws:iam::aws:policy/AWSXRayDaemonWriteAccess
      Policies:
        - PolicyName: S3Access
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:PutObject
                  - s3:DeleteObject
                  - s3:ListBucket
                Resource:
                  - !Join ["", ["arn:aws:s3:::", !FindInMap [StageConfig, !Ref Stage, S3Bucket]]]
                  - !Join ["", ["arn:aws:s3:::", !FindInMap [StageConfig, !Ref Stage, S3Bucket], "/*"]]

  libsLight:
    Type: AWS::Serverless::LayerVersion
    Properties:
      LayerName: !FindInMap [StageConfig, !Ref Stage, LightLayerName]
      Description: JedMee (User) shared Node.js dependencies
      ContentUri: lib/nodejs-light/
      CompatibleRuntimes:
        - nodejs22.x

  Api:
    Type: AWS::Serverless::Api
    Properties:
      Name: !FindInMap [StageConfig, !Ref Stage, ApiName]
      StageName: !Ref Stage
      EndpointConfiguration: REGIONAL
      Cors:
        AllowOrigin: "'*'"
        AllowHeaders: "'Content-Type,Authorization'"
        AllowMethods: "'GET,POST,PUT,DELETE,PATCH,OPTIONS'"

  # ── Single router function — handles ALL API routes ─────────────────────────
  # Wired with one ANY /{proxy+} catch-all (plus ANY / for the root) instead of
  # one Api event per route. Each Api event creates an AWS::Lambda::Permission,
  # and Lambda's resource-based policy is hard-capped at 20 KB. With ~150
  # routes that limit was being breached during deploy — the proxy approach
  # keeps the policy at a constant ~2 statements regardless of route count.
  #
  # Internal dispatch happens in src/handlers/router/index.js, which matches
  # event.path against the route templates and reconstructs event.resource +
  # event.pathParameters so downstream handlers behave identically.
  RouterFunction:
    Type: AWS::Serverless::Function
    Properties:
      # CodeUri intentionally points at src/ (not the backend root) so the
      # function zip ends up source-only. Every npm dep lives in the layer
      # (lib/nodejs-light/nodejs/package.json), and dev-only files like
      # local-server.js, sql/, samconfig.toml stay outside the zip entirely.
      CodeUri: src/
      Handler: handlers/router/index.handler
      Timeout: 300
      Role: !GetAtt LambdaExecutionRole.Arn
      Description: "Single API router — internally dispatches every route in handlers/router/index.js"
      Events:
        ApiRoot:
          Type: Api
          Properties:
            RestApiId: !Ref Api
            Path: /
            Method: ANY
        ApiProxy:
          Type: Api
          Properties:
            RestApiId: !Ref Api
            Path: /{proxy+}
            Method: ANY

  # ── Scheduled: daily low-stock digest (kept separate — Schedule event) ──────
  NotificationsDailyDigestFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src/
      Handler: handlers/notifications/dailyDigest.handler
      Timeout: 120
      Role: !GetAtt LambdaExecutionRole.Arn
      Events:
        DailyLowStockDigest:
          Type: Schedule
          Properties:
            Schedule: cron(30 1 * * ? *)
            Name: !Sub medico-user-low-stock-digest-${Stage}
            Description: Daily in-app low-stock notifications (01:30 UTC)
            Enabled: true
