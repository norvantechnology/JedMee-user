  # ── Scheduled: daily low-stock digest (kept separate — Schedule event) ──────
  NotificationsDailyDigestFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: .
      Handler: src/handlers/notifications/dailyDigest.handler
      Timeout: 120
      Role: !GetAtt LambdaExecutionRole.Arn
      Events:
        DailyLowStockDigest:
          Type: Schedule
          Properties:
            Schedule: cron(30 1 * * ? *)
            Name: !Sub medico-user-low-stock-digest-${Stage}
            Description: Daily in-app low-stock notifications (01:30 UTC)
            Enabled: true
