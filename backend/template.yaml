        REFRESH_TOKEN_TTL_REMEMBER_SECONDS: !FindInMap [StageConfig, !Ref Stage, RefreshTokenTtlRememberSeconds]
        S3_BUCKET: !FindInMap [StageConfig, !Ref Stage, S3Bucket]
        S3_REGION: !FindInMap [StageConfig, !Ref Stage, S3Region]
        SMTP_HOST: !FindInMap [StageConfig, !Ref Stage, SmtpHost]
        SMTP_PORT: !FindInMap [StageConfig, !Ref Stage, SmtpPort]
        SMTP_SECURE: !FindInMap [StageConfig, !Ref Stage, SmtpSecure]
        SMTP_USER: !FindInMap [StageConfig, !Ref Stage, SmtpUser]
        SMTP_PASS: !FindInMap [StageConfig, !Ref Stage, SmtpPass]
        SMTP_FROM: !FindInMap [StageConfig, !Ref Stage, SmtpFrom]
        EMAIL_VERIFY_OTP_TTL_MINUTES: !FindInMap [StageConfig, !Ref Stage, EmailVerifyOtpTtlMinutes]
        PASSWORD_RESET_OTP_TTL_MINUTES: !FindInMap [StageConfig, !Ref Stage, PasswordResetOtpTtlMinutes]
        MEDICO_EMAIL_DRY_RUN: !FindInMap [StageConfig, !Ref Stage, MedicoEmailDryRun]
    Layers:
      - !Ref libsLight
    Tags:
      Application: "JedMee"
      Panel: "User"
      Environment: !FindInMap [StageConfig, !Ref Stage, EnvironmentTag]

Resources:
  # ── Shared IAM execution role ───────────────────────────────────────────────
  LambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub medico-user-lambda-role-${Stage}
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
        - arn:aws:iam::aws:policy/AWSXRayDaemonWriteAccess
      Policies:
        - PolicyName: S3Access
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:PutObject
                  - s3:DeleteObject
                  - s3:ListBucket
                Resource:
                  - !Join ["", ["arn:aws:s3:::", !FindInMap [StageConfig, !Ref Stage, S3Bucket]]]
                  - !Join ["", ["arn:aws:s3:::", !FindInMap [StageConfig, !Ref Stage, S3Bucket], "/*"]]

  libsLight:
    Type: AWS::Serverless::LayerVersion
    Properties:
      LayerName: !FindInMap [StageConfig, !Ref Stage, LightLayerName]
      Description: JedMee (User) shared Node.js dependencies
      ContentUri: lib/nodejs-light/
      CompatibleRuntimes:
        - nodejs22.x

  Api:
    Type: AWS::Serverless::Api
    Properties:
      Name: !FindInMap [StageConfig, !Ref Stage, ApiName]
      StageName: !Ref Stage
      EndpointConfiguration: REGIONAL
      Cors:
        AllowOrigin: "'*'"
        AllowHeaders: "'Content-Type,Authorization'"
        AllowMethods: "'GET,POST,PUT,DELETE,PATCH,OPTIONS'"

  # ── Single router function — handles ALL API routes ─────────────────────────
  # Replaces ~155 individual Lambda functions → cuts CloudFormation resources
  # from 500+ to ~50 and deploy time from 20 min to ~2 min.
  RouterFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: .
      Handler: src/handlers/router/index.handler
      Timeout: 300
      Role: !GetAtt LambdaExecutionRole.Arn
      Description: Central API router — dispatches to individual handler modules
