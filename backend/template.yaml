    local:
      MemorySize: "256"
      BrandDisplayName: "JedMee"
      AppName: "medico-user-backend-local"
      ApiName: "medico-user-api-local"
      LightLayerName: "medico-user-lib-light-local"
      DbHost: "db.tcmjudishpkcyesabvqq.supabase.co"
      DbPort: "5432"
      DbName: "postgres"
      DbUser: "postgres"
      DbPassword: "Medico#123456$"
      DbSsl: "require"
      BcryptCost: "12"
      JwtAccessSecret: "dev_only_change_me"
      AccessTokenTtlSeconds: "900"
      RefreshTokenTtlSeconds: "86400"
      RefreshTokenTtlRememberSeconds: "2592000"
      S3Bucket: "jedmee"
      S3Region: "eu-north-1"
      SmtpHost: "smtp.gmail.com"
      SmtpPort: "587"
      SmtpSecure: "0"
      SmtpUser: "supportjedmee@gmail.com"
      SmtpPass: "ktok ojzb wvmz pbnn"
      SmtpFrom: "JedMee <supportjedmee@gmail.com>"
      EmailVerifyOtpTtlMinutes: "15"
      PasswordResetOtpTtlMinutes: "15"
      MedicoEmailDryRun: ""
      EnvironmentTag: "Local"
    dev:
