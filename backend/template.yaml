        STAGE: !Ref Stage
        PANEL: "user"
        APP_NAME: !FindInMap [StageConfig, !Ref Stage, AppName]
        APP_BRAND_NAME: !FindInMap [StageConfig, !Ref Stage, BrandDisplayName]
        DB_HOST: !FindInMap [StageConfig, !Ref Stage, DbHost]
        DB_PORT: !FindInMap [StageConfig, !Ref Stage, DbPort]
        DB_NAME: !FindInMap [StageConfig, !Ref Stage, DbName]
        DB_USER: !FindInMap [StageConfig, !Ref Stage, DbUser]
        DB_PASSWORD: !FindInMap [StageConfig, !Ref Stage, DbPassword]
