Globals:
  Function:
    Runtime: nodejs22.x
    MemorySize: !FindInMap [StageConfig, !Ref Stage, MemorySize]
    Timeout: 30
    Tracing: Active
    Environment:
      Variables:
        STAGE: !Ref Stage
        PANEL: "user"
        APP_NAME: !FindInMap [StageConfig, !Ref Stage, AppName]
        APP_BRAND_NAME: !FindInMap [StageConfig, !Ref Stage, BrandDisplayName]
        DB_HOST: !FindInMap [StageConfig, !Ref Stage, DbHost]
        DB_PORT: !FindInMap [StageConfig, !Ref Stage, DbPort]
        DB_NAME: !FindInMap [StageConfig, !Ref Stage, DbName]
        DB_USER: !FindInMap [StageConfig, !Ref Stage, DbUser]
        DB_PASSWORD: !FindInMap [StageConfig, !Ref Stage, DbPassword]
        DB_SSL: !FindInMap [StageConfig, !Ref Stage, DbSsl]
        BCRYPT_COST: !FindInMap [StageConfig, !Ref Stage, BcryptCost]
        JWT_ACCESS_SECRET: !FindInMap [StageConfig, !Ref Stage, JwtAccessSecret]
        ACCESS_TOKEN_TTL_SECONDS: !FindInMap [StageConfig, !Ref Stage, AccessTokenTtlSeconds]
        REFRESH_TOKEN_TTL_SECONDS: !FindInMap [StageConfig, !Ref Stage, RefreshTokenTtlSeconds]
        REFRESH_TOKEN_TTL_REMEMBER_SECONDS: !FindInMap [StageConfig, !Ref Stage, RefreshTokenTtlRememberSeconds]
        S3_BUCKET: !FindInMap [StageConfig, !Ref Stage, S3Bucket]
        S3_REGION: !FindInMap [StageConfig, !Ref Stage, S3Region]
        SMTP_HOST: !FindInMap [StageConfig, !Ref Stage, SmtpHost]
        SMTP_PORT: !FindInMap [StageConfig, !Ref Stage, SmtpPort]
        SMTP_SECURE: !FindInMap [StageConfig, !Ref Stage, SmtpSecure]
        SMTP_USER: !FindInMap [StageConfig, !Ref Stage, SmtpUser]
        SMTP_PASS: !FindInMap [StageConfig, !Ref Stage, SmtpPass]
        SMTP_FROM: !FindInMap [StageConfig, !Ref Stage, SmtpFrom]
        EMAIL_VERIFY_OTP_TTL_MINUTES: !FindInMap [StageConfig, !Ref Stage, EmailVerifyOtpTtlMinutes]
        PASSWORD_RESET_OTP_TTL_MINUTES: !FindInMap [StageConfig, !Ref Stage, PasswordResetOtpTtlMinutes]
        MEDICO_EMAIL_DRY_RUN: !FindInMap [StageConfig, !Ref Stage, MedicoEmailDryRun]
    Layers:
      - !Ref libsLight
    Tags:
      Application: "JedMee"
      Panel: "User"
      Environment: !FindInMap [StageConfig, !Ref Stage, EnvironmentTag]

Resources:
  libsLight:
    Type: AWS::Serverless::LayerVersion
    Properties:
      LayerName: !FindInMap [StageConfig, !Ref Stage, LightLayerName]
      Description: JedMee (User) shared Node.js dependencies
      ContentUri: lib/nodejs-light/
      CompatibleRuntimes:
        - nodejs22.x

  Api:
    Type: AWS::Serverless::Api
    Properties:
      Name: !FindInMap [StageConfig, !Ref Stage, ApiName]
      StageName: !Ref Stage
      EndpointConfiguration: REGIONAL
      Cors:
        AllowOrigin: "'*'"
        AllowHeaders: "'Content-Type,Authorization'"
        AllowMethods: "'GET,POST,PUT,DELETE,OPTIONS'"

  HelloFunction:
