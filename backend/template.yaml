Globals:
  Function:
    Runtime: nodejs22.x
    MemorySize: !FindInMap [StageConfig, !Ref Stage, MemorySize]
    Timeout: 30
    Tracing: Active
    Environment:
      Variables:
        STAGE: !Ref Stage
        PANEL: "user"
        APP_NAME: !FindInMap [StageConfig, !Ref Stage, AppName]
        APP_BRAND_NAME: !FindInMap [StageConfig, !Ref Stage, BrandDisplayName]
        DB_HOST: !FindInMap [StageConfig, !Ref Stage, DbHost]
        DB_PORT: !FindInMap [StageConfig, !Ref Stage, DbPort]
        DB_NAME: !FindInMap [StageConfig, !Ref Stage, DbName]
        DB_USER: !FindInMap [StageConfig, !Ref Stage, DbUser]
        DB_PASSWORD: !FindInMap [StageConfig, !Ref Stage, DbPassword]
        DB_SSL: !FindInMap [StageConfig, !Ref Stage, DbSsl]
        BCRYPT_COST: !FindInMap [StageConfig, !Ref Stage, BcryptCost]
        JWT_ACCESS_SECRET: !FindInMap [StageConfig, !Ref Stage, JwtAccessSecret]
        ACCESS_TOKEN_TTL_SECONDS: !FindInMap [StageConfig, !Ref Stage, AccessTokenTtlSeconds]
        REFRESH_TOKEN_TTL_SECONDS: !FindInMap [StageConfig, !Ref Stage, RefreshTokenTtlSeconds]
        REFRESH_TOKEN_TTL_REMEMBER_SECONDS: !FindInMap [StageConfig, !Ref Stage, RefreshTokenTtlRememberSeconds]
        S3_BUCKET: !FindInMap [StageConfig, !Ref Stage, S3Bucket]
        S3_REGION: !FindInMap [StageConfig, !Ref Stage, S3Region]
        SMTP_HOST: !FindInMap [StageConfig, !Ref Stage, SmtpHost]
        SMTP_PORT: !FindInMap [StageConfig, !Ref Stage, SmtpPort]
        SMTP_SECURE: !FindInMap [StageConfig, !Ref Stage, SmtpSecure]
        SMTP_USER: !FindInMap [StageConfig, !Ref Stage, SmtpUser]
        SMTP_PASS: !FindInMap [StageConfig, !Ref Stage, SmtpPass]
        SMTP_FROM: !FindInMap [StageConfig, !Ref Stage, SmtpFrom]
        EMAIL_VERIFY_OTP_TTL_MINUTES: !FindInMap [StageConfig, !Ref Stage, EmailVerifyOtpTtlMinutes]
        PASSWORD_RESET_OTP_TTL_MINUTES: !FindInMap [StageConfig, !Ref Stage, PasswordResetOtpTtlMinutes]
        MEDICO_EMAIL_DRY_RUN: !FindInMap [StageConfig, !Ref Stage, MedicoEmailDryRun]
        APP_LOGO_URL: !FindInMap [StageConfig, !Ref Stage, AppLogoUrl]
        FIREBASE_PROJECT_ID: !FindInMap [StageConfig, !Ref Stage, FirebaseProjectId]
        FIREBASE_CLIENT_EMAIL: !FindInMap [StageConfig, !Ref Stage, FirebaseClientEmail]
        FIREBASE_PRIVATE_KEY: !FindInMap [StageConfig, !Ref Stage, FirebasePrivateKey]
    Layers:
      - !Ref libsLight
    Tags:
      Application: "JedMee"
      Panel: "User"
      Environment: !FindInMap [StageConfig, !Ref Stage, EnvironmentTag]

Resources:
  # ── Shared IAM execution role ───────────────────────────────────────────────
  LambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub medico-user-lambda-role-${Stage}
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
        - arn:aws:iam::aws:policy/AWSXRayDaemonWriteAccess
      Policies:
        - PolicyName: S3Access
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:PutObject
                  - s3:DeleteObject
                  - s3:ListBucket
                Resource:
                  - !Join ["", ["arn:aws:s3:::", !FindInMap [StageConfig, !Ref Stage, S3Bucket]]]
                  - !Join ["", ["arn:aws:s3:::", !FindInMap [StageConfig, !Ref Stage, S3Bucket], "/*"]]

  libsLight:
    Type: AWS::Serverless::LayerVersion
    Properties:
      LayerName: !FindInMap [StageConfig, !Ref Stage, LightLayerName]
      Description: JedMee (User) shared Node.js dependencies
      ContentUri: lib/nodejs-light/
      CompatibleRuntimes:
        - nodejs22.x

  Api:
    Type: AWS::Serverless::Api
    Properties:
      Name: !FindInMap [StageConfig, !Ref Stage, ApiName]
      StageName: !Ref Stage
      EndpointConfiguration: REGIONAL
      # Without OpenApiVersion, SAM auto-creates a phantom "Stage" stage in
      # addition to the real one (because AWS::ApiGateway::Deployment defaults
      # StageName to "Stage"). That phantom stage points at an empty deployment
      # and returns 502 for every route. Pinning OpenApiVersion suppresses it.
      # See: https://github.com/aws/serverless-application-model/issues/191
      OpenApiVersion: "3.0.1"
      Cors:
        AllowOrigin: "'*'"
        AllowHeaders: "'Content-Type,Authorization'"
        AllowMethods: "'GET,POST,PUT,DELETE,PATCH,OPTIONS'"

  # ── Single router function — handles ALL API routes ─────────────────────────
  # Wired with one ANY /{proxy+} catch-all (plus ANY / for the root) instead of
  # one Api event per route. Each Api event creates an AWS::Lambda::Permission,
  # and Lambda's resource-based policy is hard-capped at 20 KB. With ~150
  # routes that limit was being breached during deploy — the proxy approach
  # keeps the policy at a constant ~2 statements regardless of route count.
  #
  # Internal dispatch happens in src/handlers/router/index.js, which matches
  # event.path against the route templates and reconstructs event.resource +
  # event.pathParameters so downstream handlers behave identically.
  RouterFunction:
    Type: AWS::Serverless::Function
    Properties:
      # CodeUri intentionally points at src/ (not the backend root) so the
      # function zip ends up source-only. Every npm dep lives in the layer
      # (lib/nodejs-light/nodejs/package.json), and dev-only files like
      # local-server.js, sql/, samconfig.toml stay outside the zip entirely.
      CodeUri: src/
      Handler: handlers/router/index.handler
      Timeout: 300
      Role: !GetAtt LambdaExecutionRole.Arn
      Description: "Single API router — internally dispatches every route in handlers/router/index.js"
      Events:
        ApiRoot:
          Type: Api
          Properties:
            RestApiId: !Ref Api
            Path: /
            Method: ANY
        ApiProxy:
          Type: Api
          Properties:
            RestApiId: !Ref Api
            Path: /{proxy+}
            Method: ANY

  # ── Scheduled: daily low-stock digest (kept separate — Schedule event) ──────
  NotificationsDailyDigestFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src/
      Handler: handlers/notifications/dailyDigest.handler
      Timeout: 120
      Role: !GetAtt LambdaExecutionRole.Arn
      Events:
        DailyLowStockDigest:
          Type: Schedule
          Properties:
            Schedule: cron(30 1 * * ? *)
            Name: !Sub medico-user-low-stock-digest-${Stage}
            Description: Daily in-app low-stock notifications (01:30 UTC)
            Enabled: true

# ── Stack outputs ──────────────────────────────────────────────────────────────
# Visible via:
#   aws cloudformation describe-stacks --stack-name medico-user-backend-${Stage} \
#       --region eu-north-1 --query 'Stacks[0].Outputs'
# Anything that is a SECRET (DB password, JWT secret, SMTP password, etc.) is
# intentionally NOT exported here — CloudFormation Outputs are readable by
# anyone with `cloudformation:DescribeStacks`, so they must remain non-sensitive.
Outputs:
  Stage:
    Description: Deployment stage
    Value: !Ref Stage
    Export:
      Name: !Sub medico-user-backend-${Stage}-Stage

  Region:
    Description: AWS region the stack is deployed to
    Value: !Ref AWS::Region
    Export:
      Name: !Sub medico-user-backend-${Stage}-Region

  AccountId:
    Description: AWS account hosting the stack
    Value: !Ref AWS::AccountId

  # ── API Gateway ────────────────────────────────────────────────────────────
  ApiId:
    Description: API Gateway REST API ID
    Value: !Ref Api
    Export:
      Name: !Sub medico-user-backend-${Stage}-ApiId

  ApiBaseUrl:
    Description: Public HTTPS URL of the API (use this as VITE_API_BASE_URL in the frontend)
    Value: !Sub https://${Api}.execute-api.${AWS::Region}.amazonaws.com/${Stage}
    Export:
      Name: !Sub medico-user-backend-${Stage}-ApiBaseUrl

  ApiName:
    Description: Friendly name of the API Gateway REST API
    Value: !FindInMap [StageConfig, !Ref Stage, ApiName]

  # ── Lambda functions ──────────────────────────────────────────────────────
  RouterFunctionName:
    Description: Name of the API router Lambda function
    Value: !Ref RouterFunction

  RouterFunctionArn:
    Description: ARN of the API router Lambda function
    Value: !GetAtt RouterFunction.Arn
    Export:
      Name: !Sub medico-user-backend-${Stage}-RouterFunctionArn

  NotificationsDailyDigestFunctionName:
    Description: Name of the scheduled daily-digest Lambda
    Value: !Ref NotificationsDailyDigestFunction

  NotificationsDailyDigestFunctionArn:
    Description: ARN of the scheduled daily-digest Lambda
    Value: !GetAtt NotificationsDailyDigestFunction.Arn

  # ── IAM / Layer ────────────────────────────────────────────────────────────
  LambdaExecutionRoleArn:
    Description: ARN of the shared Lambda execution role
    Value: !GetAtt LambdaExecutionRole.Arn
    Export:
      Name: !Sub medico-user-backend-${Stage}-LambdaExecutionRoleArn

  LambdaExecutionRoleName:
    Description: Friendly name of the shared Lambda execution role
    Value: !Ref LambdaExecutionRole

  LayerArn:
    Description: ARN of the shared Node.js dependencies layer (current version)
    Value: !Ref libsLight
    Export:
      Name: !Sub medico-user-backend-${Stage}-LayerArn

  LayerName:
    Description: Friendly name of the shared Node.js dependencies layer
    Value: !FindInMap [StageConfig, !Ref Stage, LightLayerName]

  # ── Branding (passed through to the frontend build) ────────────────────────
  BrandDisplayName:
    Description: Brand name shown in UI / emails / PDFs (use as VITE_APP_DISPLAY_NAME)
    Value: !FindInMap [StageConfig, !Ref Stage, BrandDisplayName]

  AppName:
    Description: Backend app identifier (CloudWatch log group prefix, etc.)
    Value: !FindInMap [StageConfig, !Ref Stage, AppName]

  # ── S3 (uploads) ───────────────────────────────────────────────────────────
  S3Bucket:
    Description: S3 bucket used for user-uploaded assets
    Value: !FindInMap [StageConfig, !Ref Stage, S3Bucket]

  S3Region:
    Description: Region of the uploads S3 bucket
    Value: !FindInMap [StageConfig, !Ref Stage, S3Region]

  # ── Database (host/port only — credentials are NOT exported) ──────────────
  DbHost:
    Description: Database host (non-secret)
    Value: !FindInMap [StageConfig, !Ref Stage, DbHost]

  DbPort:
    Description: Database port
    Value: !FindInMap [StageConfig, !Ref Stage, DbPort]

  DbName:
    Description: Database name
    Value: !FindInMap [StageConfig, !Ref Stage, DbName]

  DbSslMode:
    Description: Database SSL mode (require / disable)
    Value: !FindInMap [StageConfig, !Ref Stage, DbSsl]

  # ── SMTP (host / port / from-address only — password NOT exported) ────────
  SmtpHost:
    Description: SMTP host
    Value: !FindInMap [StageConfig, !Ref Stage, SmtpHost]

  SmtpPort:
    Description: SMTP port
    Value: !FindInMap [StageConfig, !Ref Stage, SmtpPort]

  SmtpFrom:
    Description: From address used in transactional emails
    Value: !FindInMap [StageConfig, !Ref Stage, SmtpFrom]

  # ── Token / OTP TTLs ──────────────────────────────────────────────────────
  AccessTokenTtlSeconds:
    Description: JWT access-token lifetime (seconds)
    Value: !FindInMap [StageConfig, !Ref Stage, AccessTokenTtlSeconds]

  RefreshTokenTtlSeconds:
    Description: Refresh-token lifetime (seconds)
    Value: !FindInMap [StageConfig, !Ref Stage, RefreshTokenTtlSeconds]

  RefreshTokenTtlRememberSeconds:
    Description: Refresh-token lifetime when "remember me" is checked (seconds)
    Value: !FindInMap [StageConfig, !Ref Stage, RefreshTokenTtlRememberSeconds]

  EmailVerifyOtpTtlMinutes:
    Description: Email-verification OTP lifetime (minutes)
    Value: !FindInMap [StageConfig, !Ref Stage, EmailVerifyOtpTtlMinutes]

  PasswordResetOtpTtlMinutes:
    Description: Password-reset OTP lifetime (minutes)
    Value: !FindInMap [StageConfig, !Ref Stage, PasswordResetOtpTtlMinutes]
