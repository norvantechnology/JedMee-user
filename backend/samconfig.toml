# AWS SAM CLI configuration for JedMee User Backend
# Used by `sam build` and `sam deploy` — values here are defaults that the
# GitHub Actions workflow overrides via CLI flags where needed.

version = 0.1

[default.global.parameters]
stack_name = "medico-user-backend"

# ── Production (main branch CI/CD) ───────────────────────────────────────────
[default.build.parameters]
template_file = "template.yaml"
cached          = true
parallel        = true

[default.deploy.parameters]
stack_name          = "medico-user-backend"
s3_prefix           = "sam-artifacts"
region              = "eu-north-1"
confirm_changeset   = false
fail_on_empty_changeset = false
capabilities        = "CAPABILITY_IAM CAPABILITY_NAMED_IAM"
parameter_overrides = "Stage=prod"
# s3_bucket is intentionally omitted here — supply it via
# --s3-bucket ${{ secrets.SAM_DEPLOY_BUCKET }} in the workflow so the bucket
# name stays out of source control.