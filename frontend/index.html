        <section aria-labelledby="faq-heading">
          <h2 id="faq-heading">Frequently Asked Questions</h2>

          <h3>What is JedMee pharmacy management software?</h3>
          <p>JedMee is cloud-based pharmacy management software for medicine shops and distributors worldwide. It includes tax billing, inventory management, purchase orders, sales invoices, expiry tracking, and customer and vendor ledgers.</p>

          <h3>Does JedMee support GST billing for Indian pharmacies?</h3>
          <p>Yes. JedMee supports GST, VAT, Sales Tax, and other tax systems. It generates fully tax-compliant invoices automatically based on the tax rate you set per product, including GSTR-1 compatible reports.</p>

          <h3>Is there a free plan?</h3>
          <p>Yes. JedMee offers a free 14-day trial with no credit card required. Paid plans start at $9 per month for growing pharmacies.</p>

          <h3>Can JedMee track medicine expiry dates?</h3>
          <p>Yes. JedMee tracks expiry dates for all medicine batches and sends alerts before any batch expires, helping reduce write-offs and compliance risk.</p>

          <h3>Does JedMee work for wholesale medicine distributors?</h3>
          <p>Yes. JedMee is built for both retail pharmacies and wholesale distributors. It supports bulk purchase orders, vendor management, distributor invoicing, and an online order catalog for retailers.</p>

          <h3>Is JedMee available on mobile?</h3>
          <p>Yes. JedMee is a cloud-based, mobile-friendly platform accessible from any device — desktop, tablet, or smartphone. No app download required.</p>

          <h3>Can multiple staff members use JedMee at the same time?</h3>
          <p>Yes. JedMee supports multi-user access with role-based permissions. You can assign different roles (owner, manager, staff) with granular control over what each user can view or edit.</p>
        </section>
