<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <!-- Viewport: must be set before Flutter engine initialises to prevent the
       _viewInsets.isNonNegative assertion in full_page_dimensions_provider.dart.
       Flutter's FullPageEmbeddingStrategy calls _applyViewportMeta() which
       triggers a VisualViewport resize event; if no viewport tag exists the
       browser computes a negative physicalSize delta, causing the assertion. -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <meta name="description" content="JedMee — Pharmacy management for billing, stock, and orders.">
  <meta name="theme-color" content="#4F46E5">

  <!-- PWA meta tags & icons -->
  <!-- Modern standard (Chrome/Android) -->
  <meta name="mobile-web-app-capable" content="yes">
  <!-- iOS legacy (still required for iOS Safari home-screen apps) -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="JedMee">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>JedMee</title>
  <link rel="manifest" href="manifest.json">

  <script>
    // The value below is injected by flutter build, do not touch.
    const serviceWorkerVersion = null;
  </script>
  <!-- This script adds the flutter initialization JS code -->
  <script src="flutter.js" defer></script>
</head>
<body>
  <script>
    window.addEventListener('load', function(ev) {
      // Download main.dart.js
      _flutter.loader.loadEntrypoint({
        serviceWorker: {
          serviceWorkerVersion: serviceWorkerVersion,
        },
        onEntrypointLoaded: function(engineInitializer) {
          // Force CanvasKit renderer: the HTML renderer does not support
          // FragmentProgram (GLSL shaders) used by Material widgets such as
          // TimePicker, causing "Unsupported operation: FragmentProgram is not
          // supported for the HTML renderer" errors at runtime.
          engineInitializer.initializeEngine({ renderer: "canvaskit" }).then(function(appRunner) {
            appRunner.runApp();
          });
        }
      });
    });
  </script>
</body>
</html>
