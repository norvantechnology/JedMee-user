name: jedmee_mobile
description: JedMee mobile app — feature parity with the web user application.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.5.1
  go_router: ^14.2.0
  http: ^1.2.1
  shared_preferences: ^2.2.3
  flutter_secure_storage: ^9.2.2
  intl: ^0.19.0
  fl_chart: ^0.68.0
  url_launcher: ^6.3.0
  file_picker: ^8.0.0+1
  pdf: ^3.11.1
  printing: ^5.12.0
  share_plus: ^10.0.0
  path_provider: ^2.1.4
  # Quality & reliability additions
  connectivity_plus: ^6.0.0
  logger: ^2.4.0
  package_info_plus: ^8.0.0
  local_auth: ^2.3.0
  # Push notifications (mobile only — web uses stub via conditional import)
  firebase_core: ^3.8.1
  firebase_messaging: ^15.2.2
  flutter_local_notifications: ^18.0.1
  mobile_scanner: ^6.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/branding/
  fonts:
    - family: PlusJakartaSans
      fonts:
        - asset: assets/fonts/PlusJakartaSans.ttf
    - family: NotoSans
      fonts:
        - asset: assets/fonts/NotoSans.ttf
    - family: NotoSansDevanagari
      fonts:
        - asset: assets/fonts/NotoSansDevanagari.ttf
