name: SEO Weekly Audit

on:
  schedule:
    - cron: '0 6 * * 1'
  workflow_dispatch:
    inputs:
      goal:
        description: Sprint goal for Manager
        required: false
        default: Weekly SEO audit — jedmee.com public pages

permissions:
  contents: read
  actions: write

jobs:
  seo-audit:
    name: Run SEO agents (read-only)
    runs-on: ubuntu-latest
    timeout-minutes: 60

    defaults:
      run:
        working-directory: seo-agents

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: seo-agents/requirements.txt

      - uses: microsoft/playwright-python@v1
        with:
          browsers: chromium

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          playwright install chromium
          chmod +x scripts/setup_ci_env.sh

      - name: Write .env from secrets
        env:
          GOOGLE_PSI_API_KEY: ${{ secrets.GOOGLE_PSI_API_KEY }}
          SERPAPI_KEY: ${{ secrets.SERPAPI_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GSC_OAUTH_CLIENT_B64: ${{ secrets.GSC_OAUTH_CLIENT_JSON }}
          GSC_OAUTH_TOKEN_B64: ${{ secrets.GSC_OAUTH_TOKEN_JSON }}
          SEO_REPO_ROOT: ${{ github.workspace }}
        run: ./scripts/setup_ci_env.sh

      - name: Run full SEO cycle
        id: run
        run: |
          RUN_ID=$(python -c "import uuid; print(uuid.uuid4())")
          python main.py run --run-id "$RUN_ID" --trigger scheduled --goal "${{ inputs.goal }}"
          echo "run_id=$RUN_ID" >> "$GITHUB_OUTPUT"

      - name: Post summary to GitHub Step Summary
        run: python scripts/render_summary.py --run-id "${{ steps.run.outputs.run_id }}" >> "$GITHUB_STEP_SUMMARY"

      - name: Notify Slack (optional)
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: python scripts/notify_slack.py --run-id "${{ steps.run.outputs.run_id }}"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: seo-run-${{ github.run_id }}
          path: |
            seo-agents/outputs/**/*
            seo-agents/db/runs.db
          retention-days: 30
