name: SEO Apply Approved Recommendations

on:
  workflow_dispatch:
    inputs:
      run_id:
        description: UUID of completed SEO run
        required: true

permissions:
  contents: write
  pull-requests: write

jobs:
  apply:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: seo-agents

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: seo-agents/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Apply approved recommendations
        run: python main.py apply --run-id "${{ inputs.run_id }}" --no-git

      - name: Create pull request
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          BRANCH="seo/$(echo '${{ inputs.run_id }}' | cut -c1-8)"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"
          git add ../frontend/src/pages/
          git diff --cached --quiet && { echo "No changes to apply"; exit 0; }
          git commit -m "seo: apply approved recommendations run ${{ inputs.run_id }}"
          git push -u origin "$BRANCH"
          gh pr create \
            --title "SEO: apply run ${{ inputs.run_id }}" \
            --body "Auto-applied approved ONPAGE + CONTENT patches from SEO run \`${{ inputs.run_id }}\`." \
            --base main
