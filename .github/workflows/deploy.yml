name: Deploy JedMee

on:
  push:
    branches:
      - main

concurrency:
  group: deploy-main
  cancel-in-progress: true

jobs:
  # ── Backend ────────────────────────────────────────────────────────────────
  deploy-backend:
    name: Deploy Backend (SAM)
    runs-on: ubuntu-latest
    environment: dev

    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/lib/nodejs-light/nodejs/package-lock.json

      - name: Install Lambda layer dependencies
        working-directory: backend/lib/nodejs-light/nodejs
        run: npm ci

      - name: Cache SAM build
        uses: actions/cache@v4
        with:
          path: |
            backend/.aws-sam/build
            backend/.aws-sam/cache
          key: sam-${{ hashFiles('backend/template.yaml', 'backend/src/**') }}
          restore-keys: |
            sam-

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            eu-north-1

      - name: Set up AWS SAM CLI
        uses: aws-actions/setup-sam@v2
        with:
          use-installer: true

      - name: SAM build
        run: sam build --parallel --cached

      - name: SAM deploy
        run: |
          sam deploy \
            --stack-name medico-user-backend-dev \
            --s3-bucket ${{ secrets.SAM_DEPLOY_BUCKET }} \
            --s3-prefix sam-artifacts \
            --region eu-north-1 \
            --capabilities CAPABILITY_IAM CAPABILITY_NAMED_IAM \
            --parameter-overrides Stage=dev \
            --no-confirm-changeset \
            --no-fail-on-empty-changeset

      - name: Print stack outputs
        run: |
          echo "## Backend stack outputs" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          aws cloudformation describe-stacks \
            --stack-name medico-user-backend-dev \
            --region eu-north-1 \
            --query 'Stacks[0].Outputs[].[OutputKey,OutputValue]' \
            --output table | tee -a "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"

  # ── Frontend ───────────────────────────────────────────────────────────────
  deploy-frontend:
    name: Deploy Frontend (Vite → S3 + CloudFront)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment: dev
    needs: deploy-backend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Configure AWS credentials (for stack outputs)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            eu-north-1

      - name: Read backend stack outputs into env
        id: stack
        run: |
          # Pull every Output into a JSON map, then export the keys we care
          # about. The frontend build resolves to backend stack outputs first,
          # then falls back to GitHub secrets, then to hardcoded defaults.
          OUTPUTS_JSON=$(aws cloudformation describe-stacks \
            --stack-name medico-user-backend-dev \
            --region eu-north-1 \
            --query 'Stacks[0].Outputs' \
            --output json)
          get() { echo "$OUTPUTS_JSON" | jq -r --arg k "$1" '.[] | select(.OutputKey==$k) | .OutputValue'; }

          API_BASE_URL="$(get ApiBaseUrl)"
          BRAND_DISPLAY_NAME="$(get BrandDisplayName)"
          APP_NAME="$(get AppName)"

          [ -n "$API_BASE_URL" ]      && echo "API_BASE_URL=$API_BASE_URL"           >> "$GITHUB_ENV"
          [ -n "$BRAND_DISPLAY_NAME" ] && echo "BRAND_DISPLAY_NAME=$BRAND_DISPLAY_NAME" >> "$GITHUB_ENV"
          [ -n "$APP_NAME" ]           && echo "APP_NAME=$APP_NAME"                   >> "$GITHUB_ENV"

          echo "Resolved API_BASE_URL=$API_BASE_URL"
          echo "Resolved BRAND_DISPLAY_NAME=$BRAND_DISPLAY_NAME"

      - name: Write .env for Vite build
        working-directory: frontend
        run: |
          # API_BASE_URL: prefer stack output → fall back to secret → fail loud.
          BASE_URL="${API_BASE_URL:-${{ secrets.VITE_API_BASE_URL }}}"
          if [ -z "$BASE_URL" ]; then
            echo "::error::Neither stack output ApiBaseUrl nor secret VITE_API_BASE_URL is set."
            exit 1
          fi
          BRAND="${BRAND_DISPLAY_NAME:-JedMee}"
          {
            echo "VITE_API_BASE_URL=$BASE_URL"
            echo "VITE_APP_DISPLAY_NAME=$BRAND"
            echo "VITE_APP_DOCUMENT_TITLE=$BRAND User"
            echo "VITE_APP_STORAGE_NS=$(echo "$BRAND" | tr '[:upper:] ' '[:lower:]_' )"
            echo "VITE_SKIP_S3_UPLOAD=false"
          } > .env
          echo "frontend .env:"
          sed 's/=.*/=***/' .env

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('frontend/package-lock.json') }}
          restore-keys: |
            playwright-${{ runner.os }}-

      - name: Install Playwright Chromium (prerender step)
        working-directory: frontend
        run: npx playwright install chromium --with-deps

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Ensure S3 bucket exists and is public
        working-directory: frontend
        run: |
          BUCKET="${{ secrets.FRONTEND_S3_BUCKET }}"
          if [ -z "$BUCKET" ]; then
            BUCKET="jedmee-frontend"
          fi
          echo "S3_BUCKET=$BUCKET" >> $GITHUB_ENV

          if ! aws s3api head-bucket --bucket "$BUCKET" 2>/dev/null; then
            echo "Creating S3 bucket: $BUCKET"
            aws s3api create-bucket \
              --bucket "$BUCKET" \
              --region eu-north-1 \
              --create-bucket-configuration LocationConstraint=eu-north-1
          else
            echo "Bucket $BUCKET already exists"
          fi

          aws s3api put-public-access-block \
            --bucket "$BUCKET" \
            --public-access-block-configuration \
              "BlockPublicAcls=false,IgnorePublicAcls=false,BlockPublicPolicy=false,RestrictPublicBuckets=false"

          aws s3api put-bucket-policy --bucket "$BUCKET" --policy \
            "{\"Version\":\"2012-10-17\",\"Statement\":[{\"Sid\":\"PublicRead\",\"Effect\":\"Allow\",\"Principal\":\"*\",\"Action\":\"s3:GetObject\",\"Resource\":\"arn:aws:s3:::${BUCKET}/*\"}]}"

      - name: Ensure CloudFront distribution exists
        working-directory: frontend
        run: |
          BUCKET="${{ env.S3_BUCKET }}"
          DIST_ID="${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }}"

          if [ -z "$DIST_ID" ]; then
            ORIGIN_DOMAIN="${BUCKET}.s3.eu-north-1.amazonaws.com"
            DIST_ID=$(aws cloudfront list-distributions \
              --query "DistributionList.Items[?Origins.Items[0].DomainName=='${ORIGIN_DOMAIN}'].Id | [0]" \
              --output text 2>/dev/null || true)
            if [ "$DIST_ID" = "None" ] || [ -z "$DIST_ID" ]; then
              DIST_ID=""
            fi
          fi

          if [ -z "$DIST_ID" ]; then
            echo "No CloudFront distribution found — creating one..."
            BUCKET_ORIGIN="${BUCKET}.s3.eu-north-1.amazonaws.com"
            CALLER_REF="jedmee-$(date +%s)"

            jq -n \
              --arg ref  "$CALLER_REF" \
              --arg bid  "S3-${BUCKET}" \
              --arg dom  "$BUCKET_ORIGIN" \
              '{
                CallerReference:   $ref,
                Comment:           "JedMee Frontend",
                DefaultRootObject: "index.html",
                Enabled:           true,
                HttpVersion:       "http2",
                PriceClass:        "PriceClass_100",
                Origins: {
                  Quantity: 1,
                  Items: [{
                    Id:             $bid,
                    DomainName:     $dom,
                    S3OriginConfig: { OriginAccessIdentity: "" }
                  }]
                },
                DefaultCacheBehavior: {
                  TargetOriginId:       $bid,
                  ViewerProtocolPolicy: "redirect-to-https",
                  CachePolicyId:        "658327ea-f89d-4fab-a63d-7e88639e58f6",
                  Compress:             true,
                  AllowedMethods: {
                    Quantity: 2,
                    Items:    ["GET","HEAD"],
                    CachedMethods: {
                      Quantity: 2,
                      Items:    ["GET","HEAD"]
                    }
                  }
                },
                CustomErrorResponses: {
                  Quantity: 2,
                  Items: [
                    { ErrorCode: 403, ResponsePagePath: "/index.html", ResponseCode: "200", ErrorCachingMinTTL: 0 },
                    { ErrorCode: 404, ResponsePagePath: "/index.html", ResponseCode: "200", ErrorCachingMinTTL: 0 }
                  ]
                }
              }' > /tmp/cf-config.json

            DIST_ID=$(aws cloudfront create-distribution \
              --distribution-config file:///tmp/cf-config.json \
              --query 'Distribution.Id' --output text)
            echo "Created CloudFront distribution: $DIST_ID"
            echo "Add CLOUDFRONT_DISTRIBUTION_ID=$DIST_ID to your dev environment secrets"
          else
            echo "Using existing CloudFront distribution: $DIST_ID"
          fi

          echo "CF_DIST_ID=$DIST_ID" >> $GITHUB_ENV

      - name: Sync dist to S3
        working-directory: frontend
        run: |
          BUCKET="${{ env.S3_BUCKET }}"

          aws s3 sync dist/ s3://${BUCKET}/ \
            --exclude "index.html" \
            --exclude "about/index.html" \
            --exclude "contact/index.html" \
            --exclude "terms/index.html" \
            --exclude "pharmacy-management-software/index.html" \
            --exclude "pharmacy-billing-guide/index.html" \
            --exclude "pharmacy-inventory-guide/index.html" \
            --exclude "pharmacy-software-comparison/index.html" \
            --exclude "wholesale-pharmacy-software/index.html" \
            --cache-control "max-age=31536000,immutable" \
            --delete

          # Prerendered public pages (no-cache — content may change independently of hashed assets)
          aws s3 cp dist/index.html s3://${BUCKET}/index.html \
            --cache-control "no-cache" --content-type "text/html"

          for PAGE in about contact terms pharmacy-management-software pharmacy-billing-guide pharmacy-inventory-guide pharmacy-software-comparison wholesale-pharmacy-software; do
            aws s3 cp dist/${PAGE}/index.html s3://${BUCKET}/${PAGE}/index.html \
              --cache-control "no-cache" --content-type "text/html"
            # Extensionless key so S3 REST + CloudFront serves /about without trailing slash
            aws s3 cp dist/${PAGE}/index.html s3://${BUCKET}/${PAGE} \
              --cache-control "no-cache" --content-type "text/html"
          done

      - name: Invalidate CloudFront cache
        working-directory: frontend
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ env.CF_DIST_ID }} \
            --paths "/*"
