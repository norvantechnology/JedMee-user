name: Deploy JedMee

on:
  push:
    branches:
      - main

jobs:
  # ── Backend ────────────────────────────────────────────────────────────────
  deploy-backend:
    name: Deploy Backend (SAM)
    runs-on: ubuntu-latest
    environment: dev

    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/lib/nodejs-light/nodejs/package-lock.json

      - name: Install Lambda layer dependencies
        working-directory: backend/lib/nodejs-light/nodejs
        run: npm ci

      - name: Cache SAM build
        uses: actions/cache@v4
        with:
          # Cache both build output AND SAM's internal hash metadata (.aws-sam/cache).
          # Without the cache/ dir, --cached has no prior hashes to compare and
          # rebuilds every function from scratch on every run.
          path: |
            backend/.aws-sam/build
            backend/.aws-sam/cache
          key: sam-${{ hashFiles('backend/template.yaml', 'backend/src/**') }}
          restore-keys: |
            sam-

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            eu-north-1

      - name: Set up AWS SAM CLI
        uses: aws-actions/setup-sam@v2
        with:
          use-installer: true   # faster than pip install

      - name: SAM build
        run: sam build --parallel --cached

      - name: SAM deploy
        run: |
          sam deploy \
            --s3-bucket ${{ secrets.SAM_DEPLOY_BUCKET }} \
            --parameter-overrides Stage=dev \
            --no-confirm-changeset \
            --no-fail-on-empty-changeset

  # ── Frontend ───────────────────────────────────────────────────────────────
  deploy-frontend:
    name: Deploy Frontend (Vite → S3 + CloudFront)
    runs-on: ubuntu-latest
    # Runs in parallel with deploy-backend — VITE_API_BASE_URL is already
    # known from secrets and does not change between deploys.
    environment: dev

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Write .env for Vite build
        run: |
          echo "VITE_API_BASE_URL=${{ secrets.VITE_API_BASE_URL }}" > .env

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            eu-north-1

      - name: Sync dist to S3
        run: |
          # Hashed assets — cache forever
          aws s3 sync dist/ s3://${{ secrets.FRONTEND_S3_BUCKET }}/ \
            --exclude "index.html" \
            --cache-control "max-age=31536000,immutable" \
            --delete

          # index.html — always revalidate
          aws s3 cp dist/index.html s3://${{ secrets.FRONTEND_S3_BUCKET }}/index.html \
            --cache-control "no-cache"

      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }} \
            --paths "/*"